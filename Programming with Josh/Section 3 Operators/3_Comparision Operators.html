<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <script>
        let x = 1;

        //Relational
        console.log(x>0);
        console.log(x>=1)
        console.log(x<1)
        console.log(x<=1)

        //Equality
        console.log(x === 1) //Strict Equality(Type + Value i.e number + number)
        console.log(x == 1) //Lose Equality
        console.log(x != 1)

    </script>

</body>
</html>
